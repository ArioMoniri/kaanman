services:
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/cerebralink2024
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=512m
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  medical-mcp:
    build:
      context: .
      dockerfile: Dockerfile.medical-mcp
    ports:
      - "3101:3001"
    environment:
      - PORT=3001
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8100:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MEDICAL_MCP_URL=http://medical-mcp:3001
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_AUTH=neo4j/cerebralink2024
      - PATIENT_DATA_DIR=/app/patient_data
      - HEALTHCARE_MCP_URL=http://healthcare-mcp:3002
      - FOOD_DATA_MCP_URL=http://food-data-mcp:3003
      - MEDICAL_KNOWLEDGE_MCP_URL=http://medical-knowledge-mcp:3004
      - OMOPHUB_MCP_URL=http://omophub-mcp:3005
    volumes:
      - ./cookies:/app/cookies:ro
      - ./scripts:/app/scripts:ro
      - patient-data:/app/patient_data
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Healthcare MCP - Clinical decision support, drug interactions, lab interpretation
  healthcare-mcp:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install healthcare-mcp-server && npx healthcare-mcp-server"
    ports:
      - "3102:3002"
    environment:
      - PORT=3002
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Food Data Central MCP - USDA nutritional data
  food-data-mcp:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install food-data-central-mcp-server && npx food-data-central-mcp-server"
    ports:
      - "3103:3003"
    environment:
      - PORT=3003
      - FDC_API_KEY=${FDC_API_KEY}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3003/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Medical MCP (thrownlemon) - Medical knowledge, symptoms, conditions
  medical-knowledge-mcp:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install @thrownlemon/medical-mcp && npx @thrownlemon/medical-mcp"
    ports:
      - "3104:3004"
    environment:
      - PORT=3004
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3004/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # OMOP Hub MCP - OMOP CDM terminology, concept mapping
  omophub-mcp:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install omophub-mcp && npx omophub-mcp"
    ports:
      - "3105:3005"
    environment:
      - PORT=3005
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3005/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3100:3000"
    environment:
      # Empty = same origin, API proxied via Next.js rewrites
      - NEXT_PUBLIC_API_URL=
      # Backend URL for Next.js rewrite proxy (container-to-container)
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  redis-data:
  neo4j-data:
  patient-data:
