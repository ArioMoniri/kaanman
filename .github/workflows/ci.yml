name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  backend:
    name: Backend Lint & Import Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: src/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r src/backend/requirements.txt

      - name: Check imports
        run: python -c "
          import importlib, sys
          modules = [
            'src.backend.api.app',
            'src.backend.api.schemas',
            'src.backend.api.routes',
            'src.backend.agents.router',
            'src.backend.agents.clinical',
            'src.backend.agents.research',
            'src.backend.agents.drug',
            'src.backend.agents.composer',
            'src.backend.agents.trust',
            'src.backend.agents.decision_tree',
            'src.backend.agents.phi_masker',
            'src.backend.core.orchestrator',
            'src.backend.core.memory',
          ]
          failed = []
          for mod in modules:
            try:
              importlib.import_module(mod)
            except Exception as e:
              failed.append(f'{mod}: {e}')
          if failed:
            print('Import failures:')
            for f in failed:
              print(f'  {f}')
            sys.exit(1)
          print(f'All {len(modules)} modules imported successfully')
          "

  docker:
    name: Docker Compose Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose
        run: docker compose config --quiet
